body{font-family:Arial;background:#0b1020;color:#fff;margin:0}
.container{max-width:950px;margin:auto;padding:40px 20px}
.card{background:#111936;border:1px solid rgba(255,255,255,.1);padding:30px;border-radius:25px}
h1{text-align:center}
.question{margin:25px 0;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.1)}
label{display:block;margin:10px 0;padding:12px;border-radius:14px;background:rgba(255,255,255,.05);cursor:pointer}
button{padding:14px 20px;border:none;border-radius:999px;margin:10px;cursor:pointer;background:linear-gradient(90deg,#8b5cf6,#22d3ee);color:#fff;font-weight:bold}
.correct{background:rgba(34,197,94,.2)!important}
.wrong{background:rgba(239,68,68,.2)!important}
#resultado{display:none;margin-top:20px;padding:20px;border-radius:18px;background:rgba(34,211,238,.1)}
.correct{
  background:rgba(34,197,94,.30)!important;
  border:2px solid #22c55e!important;
  box-shadow:0 0 18px rgba(34,197,94,.45);
  color:#ffffff!important;
}
.wrong{
  background:rgba(239,68,68,.30)!important;
  border:2px solid #ef4444!important;
  box-shadow:0 0 18px rgba(239,68,68,.45);
  color:#ffffff!important;
}
.correct::before{
  content:"✅ ";
  font-weight:bold;
}
.wrong::before{
  content:"❌ ";
  font-weight:bold;
}
.feedback{
  display:block;
  margin-top:8px;
  font-size:.9rem;
  font-weight:bold;
}
.feedback.ok{color:#86efac}
.feedback.erro{color:#fca5a5}
.sem-resposta{
  border:2px dashed #facc15!important;
  background:rgba(250,204,21,.12)!important;
}
.sem-resposta::before{
  content:"⚠️ ";
}

<button onclick="gerarQuiz()">Gerar nova rodada</button>

let perguntasAtuais = [];

function embaralhar(array){
 return [...array].sort(() => Math.random() - 0.5);
}

function gerarQuiz(){
 const area = document.getElementById("quiz");
 const resultado = document.getElementById("resultado");
 resultado.style.display = "none";
 area.innerHTML = "";

 perguntasAtuais = embaralhar(bancoPerguntas).slice(0,5);

 perguntasAtuais.forEach((item,index)=>{
   const bloco = document.createElement("div");
   bloco.className = "question";

   let html = `<h3>${index+1}. ${item.pergunta}</h3>`;

   const opcoes = embaralhar(item.opcoes.map((texto,i)=>({texto,original:i})));

   opcoes.forEach(op=>{
      html += `
      <label>
        <input type="radio" name="q${index}" value="${op.original}">
        ${op.texto}
      </label>`;
   });

   bloco.innerHTML = html;
   area.appendChild(bloco);
 });
}

function corrigirQuiz(){
 let pontos = 0;

 document.querySelectorAll("label").forEach(l=>{
   l.classList.remove("correct","wrong","sem-resposta");
   const fb = l.querySelector(".feedback");
   if(fb) fb.remove();
 });

 perguntasAtuais.forEach((item,index)=>{
   const marcada = document.querySelector(`input[name="q${index}"]:checked`);
   const alternativas = document.querySelectorAll(`input[name="q${index}"]`);

   alternativas.forEach(input=>{
     const label = input.parentElement;

     if(Number(input.value) === item.correta){
       label.classList.add("correct");
       const span = document.createElement("span");
       span.className = "feedback ok";
       span.textContent = "Resposta correta";
       label.appendChild(span);
     }
   });

   if(marcada){
     const labelMarcada = marcada.parentElement;

     if(Number(marcada.value) === item.correta){
       pontos++;
     } else {
       labelMarcada.classList.add("wrong");
       const span = document.createElement("span");
       span.className = "feedback erro";
       span.textContent = "Sua resposta";
       labelMarcada.appendChild(span);
     }
   } else {
     const primeira = alternativas[0].parentElement;
     primeira.classList.add("sem-resposta");
     const span = document.createElement("span");
     span.className = "feedback erro";
     span.textContent = "Você não marcou essa questão";
     primeira.appendChild(span);
   }
 });

 const resultado = document.getElementById("resultado");
 const texto = document.getElementById("textoResultado");

 let mensagem = "";

 if(pontos === perguntasAtuais.length){
   mensagem = `🔥 Você acertou ${pontos} de ${perguntasAtuais.length}. Rodada perfeita!`;
 } else if(pontos >= 3){
   mensagem = `👏 Você acertou ${pontos} de ${perguntasAtuais.length}. Bom resultado, revise as questões marcadas em vermelho.`;
 } else {
   mensagem = `📚 Você acertou ${pontos} de ${perguntasAtuais.length}. Continue estudando e tente uma nova rodada.`;
 }

 texto.textContent = mensagem;
 resultado.style.display = "block";
 resultado.scrollIntoView({behavior:"smooth", block:"center"});
}

gerarQuiz();
